openapi: 3.0.3
info:
  title: Carrito Service API
  description: Microservicio de gestión de carritos y líneas de carrito
  version: 1.0.0

servers:
  - url: http://localhost:8082
    description: Local

tags:
  - name: Carritos
    description: Operaciones sobre carritos
  - name: Líneas
    description: Operaciones sobre líneas de carrito

paths:

  /carritos:
    post:
      tags:
        - Carritos
      summary: Crear carrito
      description: Crea un nuevo carrito vacío. Usado internamente por user-service.
      operationId: createCarrito
      responses:
        "201":
          description: Carrito creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarritoResponse"

  /carritos/{id}:
    get:
      tags:
        - Carritos
      summary: Obtener carrito por ID
      operationId: getCarrito
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Carrito encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarritoResponse"
        "404":
          description: Carrito no encontrado

  /carritos/{carritoId}/productos:
    post:
      tags:
        - Carritos
      summary: Añadir producto al carrito
      operationId: addProductToCarrito
      parameters:
        - name: carritoId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProductToCarritoRequest"
      responses:
        "200":
          description: Producto añadido, devuelve el carrito actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarritoResponse"
        "404":
          description: Carrito o producto no encontrado

  /lineas:
    get:
      tags:
        - Líneas
      summary: Obtener todas las líneas de carrito
      operationId: getAllLineas
      responses:
        "200":
          description: Lista de líneas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LineaCarritoResponse"

  /lineas/{id}:
    get:
      tags:
        - Líneas
      summary: Obtener línea de carrito por ID
      operationId: getLineaCarrito
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Línea encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineaCarritoResponse"
        "404":
          description: Línea no encontrada

    put:
      tags:
        - Líneas
      summary: Actualizar cantidad de una línea de carrito
      operationId: updateLineaCarrito
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLineaCarritoRequest"
      responses:
        "200":
          description: Línea actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineaCarritoResponse"
        "404":
          description: Línea no encontrada

    delete:
      tags:
        - Líneas
      summary: Eliminar línea de carrito
      operationId: deleteLineaCarrito
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Línea eliminada
        "404":
          description: Línea no encontrada

components:
  schemas:

    AddProductToCarritoRequest:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        size:
          $ref: "#/components/schemas/Size"

    UpdateLineaCarritoRequest:
      type: object
      properties:
        quantity:
          type: integer

    CarritoResponse:
      type: object
      properties:
        id:
          type: integer
        total:
          type: number
          format: double
        lineas:
          type: array
          items:
            $ref: "#/components/schemas/LineaCarritoResponse"

    LineaCarritoResponse:
      type: object
      properties:
        id:
          type: integer
        subtotal:
          type: number
          format: double
        quantity:
          type: integer
        size:
          $ref: "#/components/schemas/Size"
        carritoId:
          type: integer
        productId:
          type: integer
        product:
          $ref: "#/components/schemas/ProductResponse"

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: double
        finalPrice:
          type: number
          format: double
        category:
          type: string
        imageUrl:
          type: string

    Size:
      type: string
      enum:
        - XS
        - S
        - M
        - L
        - XL